<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jadwal Kuliah - SikanCuyy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Sora:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="../style.css">
    <link rel="shortcut icon" href="../favicon/09_jadwal_kuliah.svg" type="image/svg+xml">
    <style>
        /* ══ MOBILE APP LAYOUT ══ */
        body {
            padding: 0 !important;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            height: 100dvh;
            position: relative;
            box-shadow: none;
            border-radius: 0;
        }

        /* ══ APP BAR ══ */
        .app-bar {
            flex-shrink: 0;
            padding: 12px 20px 10px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .app-bar-left { display: flex; flex-direction: column; gap: 1px; }
        .app-bar-title {
            font-family: 'Sora', sans-serif;
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1.2;
        }
        .app-bar-title span { color: var(--accent); }
        .app-bar-sub {
            font-size: 0.72rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .app-bar-right { display: flex; align-items: center; gap: 10px; }
        .app-clock {
            font-family: 'Sora', sans-serif;
            font-size: 0.95rem;
            font-weight: 800;
            color: var(--accent);
            background: var(--accent-light);
            padding: 5px 12px;
            border-radius: 10px;
            letter-spacing: 0.5px;
        }
        .app-sem {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            background: var(--surface-2);
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 8px;
        }

        /* ══ SCROLLABLE CONTENT ══ */
        .wrap {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            padding: 16px 16px 90px;
        }
        .wrap::-webkit-scrollbar { display: none; }
        .wrap { scrollbar-width: none; }

        /* ══ DAY PILLS ══ */
        .days { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding: 2px 0 8px; scroll-behavior: smooth; -ms-overflow-style: none; scrollbar-width: none; }
        .days::-webkit-scrollbar { display: none; }
        .d {
            flex-shrink: 0;
            min-width: 60px;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 700;
            transition: var(--transition);
            font-size: 0.82rem;
            display: flex; flex-direction: column; align-items: center; gap: 1px;
        }
        .d span { font-size: 0.58rem; font-weight: 500; opacity: 0.65; }
        .d.sel { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 4px 12px rgba(99,102,241,0.3); }
        .d.today { border-color: var(--accent); color: var(--accent); }
        .d.today.sel { color: white; }

        .day-label {
            font-weight: 800; font-size: 1rem; margin-bottom: 12px;
            color: var(--text-primary); font-family: 'Sora', sans-serif;
            display: flex; align-items: center; justify-content: space-between;
        }

        /* ══ SCHEDULE CARD ══ */
        .row {
            display: flex;
            gap: 14px;
            align-items: stretch;
            background: var(--surface);
            border-radius: 16px;
            border: 1px solid var(--border);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            margin-bottom: 10px;
            animation: fadeUp 0.35s ease both;
            padding: 0;
        }
        .row-time {
            flex-shrink: 0;
            width: 62px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px 0;
            background: var(--accent-light);
            border-right: 1px solid var(--border);
            gap: 2px;
        }
        .row.live .row-time { background: rgba(239,68,68,0.08); border-right-color: rgba(239,68,68,0.2); }
        .row-body { flex: 1; padding: 14px 14px 14px 0; min-width: 0; }
        .r-time-start { font-weight: 800; color: var(--accent); font-size: 1rem; font-family: 'Sora', sans-serif; line-height: 1; }
        .r-time-end { font-size: 0.7rem; color: var(--text-muted); margin-top: 3px; font-weight: 600; }
        .r-mk {
            font-weight: 700; color: var(--text-primary); margin-bottom: 6px;
            display: flex; align-items: flex-start; flex-wrap: wrap; gap: 6px;
            line-height: 1.35; font-size: 0.95rem;
        }
        .r-dosen { font-size: 0.8rem; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; font-weight: 500; margin-bottom: 6px; }
        .r-dosen i { font-size: 0.75rem; color: var(--accent); opacity: 0.7; }
        .r-room-row { display: flex; align-items: center; gap: 6px; }
        .r-room-badge {
            display: inline-flex; align-items: center; gap: 5px;
            background: var(--surface-2); border: 1px solid var(--border);
            border-radius: 8px; padding: 3px 10px;
            font-size: 0.75rem; font-weight: 700; color: var(--text-secondary);
        }
        .r-room-badge i { font-size: 0.7rem; color: var(--accent); }
        .row:active { transform: scale(0.98); }
        .row.live { border-color: rgba(239,68,68,0.3); }
        .row.live .r-time-start { color: #ef4444; }

        .live-pill {
            background: #ef4444; color: white; font-size: 0.6rem; font-weight: 800;
            padding: 2px 8px; border-radius: 100px; display: inline-flex; align-items: center; gap: 4px;
            text-transform: uppercase;
        }
        .live-dot { width: 5px; height: 5px; background: white; border-radius: 50%; animation: pulse-soft 1s infinite; }
        .upcoming-pill {
            background: var(--accent); color: white; font-size: 0.6rem; font-weight: 800;
            padding: 2px 8px; border-radius: 100px; display: inline-flex; align-items: center; gap: 4px;
        }

        /* ══ BOTTOM NAV ══ */
        nav {
            position: fixed;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 100%; max-width: 600px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 200;
            padding: 6px 8px calc(6px + env(safe-area-inset-bottom));
            display: flex;
        }
        body.dark nav { background: rgba(13,15,26,0.95); }
        .nw { display: flex; width: 100%; }
        .nb {
            flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
            background: none; border: none; padding: 6px 4px 4px;
            color: var(--text-muted); font-size: 0.6rem; font-weight: 700;
            cursor: pointer; border-radius: 12px; transition: var(--transition);
            text-transform: uppercase; letter-spacing: 0.03em; position: relative;
        }
        .nb svg { width: 20px; height: 20px; margin-bottom: 1px; transition: transform 0.2s ease; }
        .nb.on { color: var(--accent); }
        .nb.on svg { transform: translateY(-2px); }
        .nb-indicator {
            position: absolute;
            bottom: 2px; left: 50%; transform: translateX(-50%);
            width: 4px; height: 4px; border-radius: 50%;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .nb.on .nb-indicator { opacity: 1; }

        /* ══ SEARCH ══ */
        .search-wrap {
            position: relative; display: flex; align-items: center;
            margin-bottom: 14px;
        }
        .search-wrap i { position: absolute; left: 13px; color: var(--text-muted); font-size: 0.82rem; pointer-events: none; }
        .search-wrap input {
            width: 100%; padding: 10px 14px 10px 36px;
            border: 1px solid var(--border); border-radius: 12px;
            background: var(--surface-2); color: var(--text-primary);
            font-size: 0.88rem; font-family: inherit;
            transition: var(--transition); outline: none;
        }
        .search-wrap input:focus { border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        .search-wrap input::placeholder { color: var(--text-muted); }

        /* ══ MK TABS ══ */
        .mktabs { display: flex; gap: 8px; overflow-x: auto; padding: 2px 0 12px; margin-bottom: 8px; -ms-overflow-style: none; scrollbar-width: none; }
        .mktabs::-webkit-scrollbar { display: none; }
        .mkt {
            white-space: nowrap; padding: 8px 16px; border-radius: 10px;
            border: 1px solid var(--border); background: var(--surface-2);
            color: var(--text-secondary); font-size: 0.78rem; font-weight: 700;
            cursor: pointer; transition: var(--transition); flex-shrink: 0;
        }
        .mkt.sel { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 4px 10px rgba(99,102,241,0.25); }
        .mk-note { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 14px; padding: 8px 12px; background: var(--surface-2); border-radius: 10px; border-left: 3px solid var(--accent); font-weight: 500; }

        /* ══ KELOMPOK CARDS ══ */
        .gg { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 16px; }
        .gc { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: var(--shadow-sm); transition: var(--transition); }
        .gc:active { transform: scale(0.98); }
        .gc-head {
            padding: 14px 16px; background: var(--surface-2); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .gc-head b { font-size: 0.95rem; color: var(--text-primary); font-family: 'Sora', sans-serif; display: flex; align-items: center; gap: 8px; font-weight: 800; }
        .gc-head b i { color: var(--accent); }
        .gc-head em { font-size: 0.7rem; color: var(--text-muted); font-style: normal; font-weight: 700; background: var(--surface); padding: 2px 8px; border-radius: 8px; border: 1px solid var(--border); }
        .gc-body { padding: 8px; display: flex; flex-direction: column; gap: 4px; }
        .ml { display: flex; align-items: center; gap: 12px; padding: 9px 10px; border-radius: 10px; transition: var(--transition); }
        .ml:active { background: var(--accent-light); }
        .ml-n { width: 28px; height: 28px; border-radius: 10px; background: var(--accent-light); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 800; flex-shrink: 0; }
        .ml-nm { font-size: 0.9rem; font-weight: 700; color: var(--text-primary); }
        .ml-id { font-size: 0.7rem; color: var(--text-muted); font-family: monospace; margin-top: 1px; }

        /* ══ TABLE ══ */
        .tbl-wrap { border-radius: 14px; border: 1px solid var(--border); background: var(--surface); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--surface-2); padding: 11px 14px; text-align: left; font-size: 0.7rem; text-transform: uppercase; color: var(--text-secondary); border-bottom: 1px solid var(--border); font-weight: 800; letter-spacing: 0.05em; }
        td { padding: 12px 14px; font-size: 0.9rem; color: var(--text-primary); border-bottom: 1px solid var(--border); }
        tr:last-child td { border-bottom: none; }
        tr:active td { background: var(--surface-2); }
        .td-n { width: 36px; font-weight: 800; color: var(--text-muted); text-align: center; font-size: 0.8rem; }
        .td-id { font-family: monospace; color: var(--accent); font-size: 0.78rem; font-weight: 600; }

        /* ══ EXPORT BAR ══ */
        .export-bar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
        .export-bar-left h2 { font-family: 'Sora', sans-serif; font-size: 1.1rem; font-weight: 800; color: var(--text-primary); margin-bottom: 2px; }
        .export-sub { font-size: 0.75rem; color: var(--text-muted); }
        .export-bar-right { display: flex; gap: 8px; }
        .btn-export { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: 10px; font-weight: 700; font-size: 0.78rem; cursor: pointer; transition: all 0.2s ease; border: 1px solid var(--border); font-family: inherit; color: var(--text-primary); background: var(--surface-2); }
        .btn-export:active { background: var(--accent); color: white; border-color: var(--accent); }

        /* ══ DOSEN CARDS ══ */
        .dosen-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
        .dosen-card {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            transition: var(--transition);
            animation: fadeUp 0.35s ease both;
        }
        .dosen-card:active { transform: scale(0.98); }
        .dc-avatar {
            flex-shrink: 0;
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--accent), #818cf8);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Sora', sans-serif;
            font-weight: 800;
            font-size: 1rem;
            letter-spacing: -0.5px;
        }
        .dc-body { flex: 1; min-width: 0; }
        .dc-name {
            font-weight: 800;
            font-size: 0.95rem;
            color: var(--text-primary);
            font-family: 'Sora', sans-serif;
            margin-bottom: 4px;
            line-height: 1.3;
        }
        .dc-nip {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: monospace;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 10px;
        }
        .dc-nip i { color: var(--accent); opacity: 0.6; font-size: 0.7rem; }
        .dc-mks { display: flex; flex-direction: column; gap: 5px; }
        .dc-mk-badge {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: var(--accent-light);
            color: var(--accent);
            border: 1px solid rgba(99,102,241,0.15);
            border-radius: 8px;
            padding: 5px 10px;
            font-size: 0.8rem;
            font-weight: 600;
            line-height: 1.3;
        }
        .dc-mk-badge i { font-size: 0.7rem; flex-shrink: 0; }

        /* ══ MISC ══ */
        .tab { display: none; }
        .tab.on { display: block; animation: fadeUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .highlight-match { background: #ffeb3b; color: #000; border-radius: 2px; padding: 0 2px; }
        body.dark .highlight-match { background: #fbc02d; }
        .empty-row { padding: 32px 16px; text-align: center; color: var(--text-muted); font-weight: 600; font-size: 0.9rem; background: var(--surface-2); border-radius: 14px; border: 2px dashed var(--border); margin-top: 8px; grid-column: 1 / -1; }

        @media (min-width: 601px) {
            .gg { grid-template-columns: repeat(2, 1fr); }
        }

        /* ══ FAB GROUP — bottom-right, above nav ══ */
        .fab-group {
            position: fixed;
            bottom: 80px;
            right: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 150;
        }
        .fab-group .back-btn,
        .fab-group .dark-toggle {
            position: static !important;
            top: auto !important;
            right: auto !important;
            left: auto !important;
            bottom: auto !important;
            width: 40px !important;
            height: 40px !important;
            flex-shrink: 0;
        }

        /* ══ PULL TO REFRESH ══ */
        .ptr-indicator {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 1rem;
            transition: top 0.1s ease, opacity 0.2s ease;
            opacity: 0;
            z-index: 10;
        }
        .ptr-indicator.pulling { opacity: 1; }
        .ptr-indicator.ready { color: #22c55e; }
        .ptr-indicator.loading i { animation: ptr-spin 0.7s linear infinite; }
        @keyframes ptr-spin { to { transform: rotate(360deg); } }
        .wrap { position: relative; }
    </style>
</head>
<body>

<div class="container">

    <!-- APP BAR -->
    <div class="app-bar">
        <div class="app-bar-left">
            <div class="app-bar-title" id="ttl">Jadwal <span>Kelas</span></div>
            <div class="app-bar-sub">TRJT 2A · Semester 4</div>
        </div>
        <div class="app-bar-right">
            <div class="app-clock" id="clk">--:--:--</div>
        </div>
    </div>

<div class="wrap" id="wrap">
  <div class="ptr-indicator" id="ptr"><i class="fas fa-arrow-down"></i></div>

  <!-- JADWAL -->
  <div class="tab on" id="t-jadwal">
    <div class="days" id="days"></div>
    <div class="day-label" id="dname"></div>
    <div class="rows" id="rows"></div>
  </div>

  <!-- KELOMPOK -->
  <div class="tab" id="t-kelompok">
    <div class="export-bar">
      <div class="export-bar-left">
        <h2>Kelompok MK</h2>
      </div>
      <div class="export-bar-right">
        <button class="btn-export csv" onclick="exportKelompokCSV()">
          <i class="fas fa-file-csv"></i> CSV
        </button>
        <button class="btn-export pdf" onclick="exportKelompokPDF()">
          <i class="fas fa-file-pdf"></i> PDF
        </button>
      </div>
    </div>
    
    <div class="search-wrap">
        <i class="fas fa-search"></i>
        <input type="text" id="search-kelompok" placeholder="Cari kelompok atau nama mahasiswa..." oninput="filterKelompok()">
    </div>

    <div class="mktabs" id="mktabs"></div>
    <div class="mk-note" id="mknote"></div>
    <div class="gg" id="gg"></div>
  </div>

  <!-- PIKET -->
  <div class="tab" id="t-piket">
    <div class="export-bar">
      <div class="export-bar-left">
        <h2>Kelompok Piket</h2>
        <span class="export-sub">4 kelompok utama</span>
      </div>
      <div class="export-bar-right">
        <button class="btn-export csv" onclick="exportPiketCSV()">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          CSV
        </button>
        <button class="btn-export pdf" onclick="exportPiketPDF()">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          PDF
        </button>
      </div>
    </div>

    <div class="search-wrap">
        <i class="fas fa-search"></i>
        <input type="text" id="search-piket" placeholder="Cari nama di kelompok piket..." oninput="filterPiket()">
    </div>

    <div class="gg" id="pg"></div>
  </div>

  <!-- DAFTAR -->
  <div class="tab" id="t-daftar">
    <div class="export-bar">
      <div class="export-bar-left">
        <h2>Daftar Mahasiswa</h2>
        <span class="export-sub">17 mahasiswa terdaftar</span>
      </div>
      <div class="export-bar-right">
        <button class="btn-export csv" onclick="exportDaftarCSV()">
          <i class="fas fa-file-csv"></i> CSV
        </button>
        <button class="btn-export pdf" onclick="exportDaftarPDF()">
          <i class="fas fa-file-pdf"></i> PDF
        </button>
      </div>
    </div>

    <div class="search-wrap">
        <i class="fas fa-search"></i>
        <input type="text" id="search-daftar" placeholder="Cari nama atau NIM..." oninput="filterDaftar()">
    </div>

    <div class="tbl-wrap">
      <table>
        <thead><tr><th>No</th><th>NIM</th><th>Nama Lengkap</th></tr></thead>
        <tbody id="tb"></tbody>
      </table>
    </div>
  </div>

  <!-- DOSEN -->
  <div class="tab" id="t-dosen">
    <div class="export-bar">
      <div class="export-bar-left">
        <h2>Daftar Dosen</h2>
        <span class="export-sub">Pengampu mata kuliah Semester 4</span>
      </div>
    </div>
    <div class="search-wrap">
      <i class="fas fa-search"></i>
      <input type="text" id="search-dosen" placeholder="Cari nama dosen atau mata kuliah..." oninput="filterDosen()">
    </div>
    <div class="dosen-grid" id="dosen-grid"></div>
  </div>

</div> <!-- end .container -->

<div class="fab-group">
    <a href="../index.html" class="back-btn" title="Kembali ke Beranda">
        <i class="fas fa-arrow-left"></i>
    </a>
    <button class="dark-toggle" onclick="toggleDark()" title="Toggle Dark Mode">
        <i class="fas fa-moon" id="toggleIcon"></i>
    </button>
</div>



<nav>
  <div class="nw">

    if (word.includes('.') || (word.length > 1 && word === word.toUpperCase())) return word;

  }).join(' ');
};

const DK  = ['senin','selasa','rabu','kamis','jumat'];
const DN  = ['Senin','Selasa','Rabu','Kamis','Jumat'];
const DS  = ['Sen','Sel','Rab','Kam','Jum'];
const TI  = {1:0,2:1,3:2,4:3,5:4};
const TOD = TI[new Date().getDay()] ?? -1;
let AD    = TOD >= 0 ? TOD : 0;

function inNow(a, b) {
  const d = new Date(), n = d.getHours()*60 + d.getMinutes();
  const [ah,am] = a.split(':').map(Number);
  const [bh,bm] = b.split(':').map(Number);
  return n >= ah*60+am && n < bh*60+bm;
}

function minUntil(a) {
  const d = new Date(), n = d.getHours()*60 + d.getMinutes();
  const [ah,am] = a.split(':').map(Number);
  return ah*60+am - n;
}

function buildDays() {
  const c = document.getElementById('days'); c.innerHTML = '';
  DK.forEach((_, i) => {
    const b = document.createElement('button');
    b.className = 'd' + (i===TOD?' today':'') + (i===AD?' sel':'');
    b.textContent = DS[i];
    b.onclick = () => { AD=i; buildDays(); renderJadwal(); };
    c.appendChild(b);
  });
}

function renderJadwal() {
  const data = jadwal[DK[AD]] || [];
  const isTod = AD===TOD && TOD>=0;
  document.getElementById('dname').textContent = DN[AD] + ' — ' + data.length + ' kelas';
  const rows = document.getElementById('rows'); rows.innerHTML = '';
  if (!data.length) {
    rows.innerHTML = '<div class="empty-row">Tidak ada kelas hari ini.</div>'; return;
  }
  data.forEach(item => {
    const live = isTod && inNow(item.jam, item.sel);
    const untl = isTod ? minUntil(item.jam) : -1;
    const upcm = !live && untl > 0 && untl <= 30;
    
    const r = document.createElement('div'); 
    r.className = 'row' + (live ? ' live' : '');
    r.innerHTML = `
      <div class="row-time">
        <div class="r-time-start">${item.jam}</div>
        <div class="r-time-end">${item.sel}</div>
      </div>
      <div class="row-body">
        <div class="r-mk">
          ${tc(item.mk)}
          ${live ? '<span class="live-pill"><span class="live-dot"></span>Live</span>' : ''}
          ${upcm ? `<span class="upcoming-pill"><i class="fas fa-clock"></i> ${untl}m</span>` : ''}
        </div>
        <div class="r-dosen"><i class="fas fa-user-tie"></i> ${item.dosen}</div>
        <div class="r-room-row">
          <span class="r-room-badge"><i class="fas fa-door-open"></i> ${item.ruang} · ${item.gedung}</span>
        </div>
      </div>`;
    rows.appendChild(r);
  });
}

      <div class="gc-body">${g.a.map((s,i) => {
        const isMatch = query && (s.nm.toLowerCase().includes(query) || s.id.includes(query));

          <div><div class="ml-nm">${highlight(tc(s.nm), query)}</div><div class="ml-id">${highlight(s.id, query)}</div></div>

  if (gg.innerHTML === '') {
    gg.innerHTML = '<div class="empty-row" style="grid-column: 1/-1;">Tidak ada hasil pencarian.</div>';
  }
}

function highlight(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const regex = new RegExp(`(${escaped})`, 'gi');
  return text.replace(regex, '<span class="highlight-match">$1</span>');
}

// ── PULL TO REFRESH ──
(function() {
  const wrap = document.getElementById('wrap');
  const ptr  = document.getElementById('ptr');
  const THRESHOLD = 70;
  let startY = 0, pulling = false, dist = 0;

  wrap.addEventListener('touchstart', e => {
    if (wrap.scrollTop === 0) {
      startY  = e.touches[0].clientY;
      pulling = true;
    }
  }, { passive: true });

  wrap.addEventListener('touchmove', e => {
    if (!pulling) return;
    dist = Math.min(e.touches[0].clientY - startY, 110);
    if (dist <= 0) { pulling = false; return; }

    const progress = Math.min(dist / THRESHOLD, 1);
    ptr.style.top = (dist * 0.55 - 60) + 'px';
    ptr.querySelector('i').style.transform = `rotate(${progress * 180}deg)`;
    ptr.classList.toggle('pulling', dist > 10);
    ptr.classList.toggle('ready',   dist >= THRESHOLD);
    ptr.querySelector('i').className = dist >= THRESHOLD ? 'fas fa-check' : 'fas fa-arrow-down';
  }, { passive: true });

  wrap.addEventListener('touchend', () => {
    if (!pulling) return;
    pulling = false;
    if (dist >= THRESHOLD) {
      ptr.classList.add('loading');
      ptr.querySelector('i').className = 'fas fa-sync-alt';
      ptr.style.top = '10px';
      setTimeout(() => location.reload(), 700);
    } else {
      ptr.style.top = '-60px';
      ptr.classList.remove('pulling', 'ready');
    }
    dist = 0;
  });
})();

function checkNotifs() {
  const d = new Date();
  const t = TI[d.getDay()];
  if (t === undefined) return;
  const data = jadwal[DK[t]];
  if (!data) return;
  
  const now = d.getHours() * 60 + d.getMinutes();
  const dateStr = d.getFullYear() + '-' + d.getMonth() + '-' + d.getDate();
  
  data.forEach(item => {
    const [jh, jm] = item.jam.split(':').map(Number);
    const st = jh * 60 + jm;
    const [sh, sm] = item.sel.split(':').map(Number);
    const en = sh * 60 + sm;
    
    const checks = [
      { id: 's15', ok: now === st - 15, msg: `⏳ <b>15 Menit lagi</b> kelas <b>${item.mk}</b> akan dimulai!\n\n👨‍🏫 Dosen: ${item.dosen}\n📍 Ruang: ${item.ruang} (${item.gedung})\n⏰ Jam: ${item.jam} - ${item.sel}` },
      { id: 's0',  ok: now === st,      msg: `🚀 Kelas <b>${item.mk}</b> <b>dimulai SEKARANG!</b>\n\n👨‍🏫 Dosen: ${item.dosen}\n📍 Ruang: ${item.ruang} (${item.gedung})\n⏰ Jam: ${item.jam} - ${item.sel}` },
      { id: 'e5',  ok: now === en - 5,  msg: `⚠️ <b>5 Menit lagi</b> kelas <b>${item.mk}</b> akan selesai.` },
      { id: 'e0',  ok: now === en,      msg: `✅ Kelas <b>${item.mk}</b> <b>telah selesai.</b>` }
    ];
    
    checks.forEach(c => {
      if (c.ok) {
        const k = `notif_${dateStr}_${item.mk.replace(/\s+/g, '_')}_${c.id}`;
        if (!localStorage.getItem(k)) {
          localStorage.setItem(k, '1');
          sendTelegram(c.msg);
        }
      }
    });
  });
}

// ── Generic CSV download ──
function downloadCSV(filename, rows) {
  const bom = '\uFEFF'; // UTF-8 BOM for Excel compatibility
  const csv = bom + rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ── Generic PDF via jsPDF ──
function makePDF(title, subtitle, headers, rows, filename) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const W = 210, mg = 18;

  // Header bar
  doc.setFillColor(79, 110, 247);
  doc.rect(0, 0, W, 28, 'F');

  doc.setTextColor(255, 255, 255);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(14);
  doc.text('TRJT 2A', mg, 11);

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.text('Teknologi Rekayasa Jaringan Telekomunikasi · Semester 4', mg, 17);

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(11);
  doc.text(title, mg, 24);

  // Subtitle
  let y = 36;
  if (subtitle) {
    doc.setTextColor(100, 100, 120);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8.5);
    doc.text(subtitle, mg, y);
    y += 7;
  }

  // Table
  doc.autoTable({
    startY: y,
    head: [headers],
    body: rows,
    margin: { left: mg, right: mg },
    styles: {
      font: 'helvetica', fontSize: 9,
      cellPadding: { top: 3.5, bottom: 3.5, left: 4, right: 4 },
      lineColor: [228, 228, 232], lineWidth: 0.3,
      textColor: [10, 10, 15],
    },
    headStyles: {
      fillColor: [245, 245, 247],
      textColor: [80, 80, 100],
      fontStyle: 'bold', fontSize: 8,
    },
    alternateRowStyles: { fillColor: [250, 250, 252] },
    tableLineColor: [228, 228, 232], tableLineWidth: 0.3,
  });

  // Footer
  const pageCount = doc.internal.getNumberOfPages();
  for (let i = 1; i <= pageCount; i++) {
    doc.setPage(i);
    doc.setTextColor(180, 180, 190);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7.5);
    const today = new Date().toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'});
    doc.text(`Dicetak: ${today}`, mg, 292);
    doc.text(`Halaman ${i} / ${pageCount}`, W - mg, 292, { align: 'right' });
  }

  doc.save(filename);
}
