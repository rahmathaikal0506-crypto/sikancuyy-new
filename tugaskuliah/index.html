<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Input Tugas - SikanCuyy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Sora:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="../style.css">
    <link rel="shortcut icon" href="../favicon/04_input_tugas.svg" type="image/svg+xml">
    <style>
        /* ── Loading Overlay ── */
        .loading-overlay {
            position: fixed; inset: 0;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; opacity: 0; visibility: hidden;
            transition: opacity 0.25s ease, visibility 0.25s ease;
        }
        body.dark .loading-overlay { background: rgba(13,15,26,0.85); }
        .loading-overlay.active { opacity: 1; visibility: visible; }
        .loading-content {
            display: flex; flex-direction: column; align-items: center; gap: 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px 40px;
            box-shadow: var(--shadow-lg);
        }
        .spinner-ring {
            width: 40px; height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-title { font-weight: 700; font-size: 0.95rem; color: var(--text-primary); }
        .loading-text { font-size: 0.82rem; color: var(--text-muted); }

        /* ── Success Popup ── */
        .popup-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center;
            z-index: 10000; padding: 24px;
        }
        .popup-overlay.open { display: flex; }
        .popup-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 36px 28px;
            text-align: center;
            max-width: 340px; width: 100%;
            box-shadow: var(--shadow-lg);
            animation: fadeUp 0.3s ease both;
        }
        .popup-icon {
            display: inline-flex; align-items: center; justify-content: center;
            width: 60px; height: 60px; border-radius: 50%;
            background: #ecfdf5; color: #10b981;
            font-size: 1.8rem; margin-bottom: 16px;
        }
        body.dark .popup-icon { background: rgba(16,185,129,0.15); }
        .popup-box h2 { font-family: 'Sora', sans-serif; font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; color: var(--text-primary); }
        .popup-box p { font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.6; }
        #close-popup {
            display: inline-flex; align-items: center; gap: 8px;
            background: #10b981; color: white;
            border: none; padding: 10px 24px;
            border-radius: var(--radius-sm);
            font-weight: 600; font-size: 0.9rem;
            cursor: pointer; font-family: inherit;
            transition: all 0.2s ease;
        }
        #close-popup:hover { background: #059669; transform: translateY(-1px); }

        /* ── Format Radio Pills ── */
        .format-group {
            display: flex; gap: 8px; flex-wrap: wrap;
        }
        .format-group input[type="radio"] { display: none; }
        .format-pill {
            padding: 6px 16px;
            border-radius: 100px;
            border: 1px solid var(--border);
            background: var(--surface-2);
            color: var(--text-secondary);
            font-size: 0.82rem; font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .format-group input[type="radio"]:checked + .format-pill {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: var(--shadow-sm);
        }
    </style>
</head>
<body>

<div class="container">

    <header>
        <div class="logo-badge"><span></span> Akademik</div>
        <h1>Input <span class="accent">Tugas</span></h1>
        <p class="subtitle">Kelola tugas kuliahmu lebih terorganisir</p>
        <div class="divider"></div>
    </header>

    <div class="card">
        <h3 class="section-title">Form Input Tugas</h3>
        <form id="task-form" method="POST" enctype="multipart/form-data" style="display: flex; flex-direction: column; gap: 0;">
          <!-- Date Row -->
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
            <div class="form-group">
              <label for="TanggalDiberikan">Tanggal Diberikan</label>
              <input type="date" id="TanggalDiberikan" name="Diberikan" required />
            </div>
            <div class="form-group">
              <label for="TanggalDikumpulkan">Tanggal Dikumpulkan</label>
              <input type="date" id="TanggalDikumpulkan" name="Dikumpulkan" required />
            </div>
          </div>

          <!-- Pertemuan -->
          <div class="form-group">
            <label for="PertemuanKe">Pertemuan Ke</label>
            <select id="PertemuanKe" name="Pertemuan" required>
                <option value="">Pilih Pertemuan</option>
                <script>
                  for (let i = 1; i <= 16; i++) {
                    document.write(`<option value="${i}">Pertemuan ${i}</option>`);
                  }
                </script>
            </select>
          </div>

          <!-- Mata Kuliah -->
          <div class="form-group">
            <label for="MataKuliah">Mata Kuliah</label>
            <select id="MataKuliah" name="MK" required>
                <option value="">Pilih Mata Kuliah</option>
                <option value="Saluran Transmisi">Saluran Transmisi</option>
                <option value="Prakt. Komunikasi Data">Prakt. Komunikasi Data</option>
                <option value="Komunikasi Data">Komunikasi Data</option>
                <option value="Pendidikan Kewarganegaraan">Pendidikan Kewarganegaraan</option>
                <option value="Prakt. Teknik Gelombang Mikro">Prakt. Teknik Gelombang Mikro</option>
                <option value="Sistem Komunikasi Serat Optik">Sistem Komunikasi Serat Optik</option>
                <option value="Prakt. Saluran Transmisi">Prakt. Saluran Transmisi</option>
                <option value="Teknik Gelombang Mikro">Teknik Gelombang Mikro</option>
                <option value="Prakt. Jaringan Komputer">Prakt. Jaringan Komputer</option>
                <option value="Jaringan Komputer">Jaringan Komputer</option>
            </select>
          </div>

          <!-- Format Teks -->
          <div class="form-group">
            <label>Format Penulisan</label>
            <div class="format-group">
                <input type="radio" id="format-default" name="text-format" value="default" checked>
                <label for="format-default" class="format-pill">Normal</label>

                <input type="radio" id="format-uppercase" name="text-format" value="uppercase">
                <label for="format-uppercase" class="format-pill">UPPER</label>

                <input type="radio" id="format-capitalize" name="text-format" value="capitalize">
                <label for="format-capitalize" class="format-pill">Capitalize</label>

                <input type="radio" id="format-title" name="text-format" value="title">
                <label for="format-title" class="format-pill">Title Case</label>
            </div>
          </div>

          <!-- Tugas Diberikan -->
          <div class="form-group">
            <label for="TugasDiberikan">Tugas Yang Diberikan</label>
            <textarea id="TugasDiberikan" name="Tugas Yang Diberikan" rows="4" placeholder="Tulis deskripsi tugas di sini..." required></textarea>
          </div>

          <button type="submit" id="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
            <i class="fa-solid fa-paper-plane"></i> Kirim Tugas
          </button>
        </form>
    </div>

    <!-- Database Link -->
    <div style="text-align: center; margin-top: 20px;">
      <a href="https://script.google.com/macros/s/AKfycbz3_eB13RTv8_waCKet9DeQchPpfLDPf5Vl9Ly4VXys1l2KDL_mazgm-UYKyFu2ZavS/exec"
         class="btn btn-secondary"
         target="_blank"
         rel="noopener noreferrer" style="width: 100%;">
        <i class="fa-solid fa-database"></i> Lihat Database
      </a>
    </div>

</div> <!-- Close container -->

<a href="../index.html" class="back-btn" title="Kembali ke Beranda">
    <i class="fas fa-arrow-left"></i>
</a>

<button class="dark-toggle" onclick="toggleDark()" title="Toggle Dark Mode">
    <i class="fas fa-moon" id="toggleIcon"></i>
</button>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-content">
    <div class="spinner-ring"></div>
    <p class="loading-title">Mengirim Data</p>
    <p class="loading-text">Mohon tunggu sebentar...</p>
  </div>
</div>

<!-- Popup Sukses -->
<div id="popup-success" class="popup-overlay">
  <div class="popup-box">
    <div class="popup-icon">
      <i class="fa-solid fa-circle-check"></i>
    </div>
    <h2>Berhasil Dikirim!</h2>
    <p>Data tugas berhasil diinput dan dikirimkan ke Google Sheets &amp; Telegram.</p>
    <button id="close-popup">
      <i class="fa-solid fa-check"></i> Tutup
    </button>
  </div>
</div>

  <script src="script.js"></script>
</body>
</html>
