<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deteksi Lokasi - SikanCuyy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Sora:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="../style.css">
    <link rel="shortcut icon" href="../favicon/06_koordinat_gps.svg" type="image/svg+xml">
</head>
<body>

<div class="container">
    <a href="../index.html" class="back-btn" title="Kembali ke Beranda">
        <i class="fas fa-arrow-left"></i>
    </a>

    <header>
        <div class="logo-badge"><span></span> Navigator</div>
        <h1>Deteksi <span class="accent">Lokasi</span></h1>
        <p class="subtitle">Ambil koordinat dan alamat real-time</p>
        <div class="divider"></div>
    </header>

    <div class="card">
        <h3 class="section-title">Lokasi Saya</h3>
        <div id="coords" class="card" style="padding: 15px; margin-bottom: 10px; font-family: monospace; background: var(--surface-2); text-align: center; border-style: dashed;">Koordinat muncul di sini...</div>
        <div id="address" class="card" style="padding: 15px; margin-bottom: 20px; background: var(--surface-2); text-align: center;">Alamat muncul di sini...</div>
        <div id="message" style="margin-bottom: 10px; color: #10b981; text-align: center; font-weight: 600; font-size: 0.9rem;"></div>
        
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <button class="btn btn-primary" onclick="getMyLocation()">📍 Ambil Lokasi Saya</button>
            <button id="mapsBtn" class="btn btn-secondary" style="display:none" onclick="openInMaps()">🗺️ Buka di Google Maps</button>
            <button id="waBtn" class="btn" style="display:none; background: #25D366; color: white;" onclick="shareToWhatsApp()">📤 Kirim ke WhatsApp</button>
        </div>
    </div>

    <div class="card" style="padding: 10px;">
        <iframe id="map" src="" allowfullscreen loading="lazy" style="width: 100%; height: 300px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface-2);"></iframe>
    </div>

    <div class="card">
        <h3 class="section-title">Cari Alamat Manual</h3>
        <div class="form-group">
            <label>Masukkan Koordinat (Lat, Lon)</label>
            <input type="text" id="latlon" placeholder="Contoh: -6.2, 106.8">
        </div>
        <button class="btn btn-secondary" style="width: 100%;" onclick="searchByLatLon()">Cari Alamat</button>
    </div>

</div> <!-- Close container -->

<button class="dark-toggle" onclick="toggleDark()" title="Toggle Dark Mode">
    <i class="fas fa-moon" id="toggleIcon"></i>
</button>

  <script>
    const coordsDiv = document.getElementById("coords");
    const addressDiv = document.getElementById("address");
    const msgDiv = document.getElementById("message");
    const latlonInput = document.getElementById("latlon");
    const mapsBtn = document.getElementById("mapsBtn");
    const waBtn = document.getElementById("waBtn");
    const mapIframe = document.getElementById("map");

    let lastLat = null;
    let lastLon = null;

    function showMessage(text) {
      msgDiv.textContent = text;
      setTimeout(() => msgDiv.textContent = "", 2000);
    }

    function formatAddress(data) {
      const c = data.address;
      return [
        c.road || "",
        c.village || c.hamlet || "",
        c.suburb || "",
        c.town || c.city || c.county || "",
        c.state || "",
        c.country || "",
        c.postcode || ""
      ].filter(Boolean).join(", ");
    }

    function updateMap(lat, lon) {
      // Satelit mode & zoom level 18
      const url = `https://www.google.com/maps?q=${lat},${lon}&t=k&z=18&output=embed`;
      mapIframe.src = url;
    }

    function updateLocation(lat, lon) {
      const coords = `${lat}, ${lon}`;
      coordsDiv.textContent = coords;
      lastLat = lat;
      lastLon = lon;
      mapsBtn.style.display = "block";
      waBtn.style.display = "block";
      addressDiv.textContent = "Mengambil alamat...";
      updateMap(lat, lon);

      fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
        .then(res => res.json())
        .then(data => {
          if (data && data.address) {
            addressDiv.textContent = formatAddress(data);
          } else {
            addressDiv.textContent = "Alamat tidak ditemukan.";
          }
        })
        .catch(() => {
          addressDiv.textContent = "Gagal mengambil alamat.";
        });
    }

    function getMyLocation() {
      if (navigator.geolocation) {
        coordsDiv.textContent = "Mengambil lokasi...";
        addressDiv.textContent = "Menunggu...";
        navigator.geolocation.getCurrentPosition(pos => {
          const lat = pos.coords.latitude.toFixed(6);
          const lon = pos.coords.longitude.toFixed(6);
          updateLocation(lat, lon);
        }, () => {
          coordsDiv.textContent = "Gagal mendapatkan lokasi.";
          addressDiv.textContent = "-";
        }, {
          enableHighAccuracy: true
        });
      } else {
        coordsDiv.textContent = "Browser tidak mendukung Geolocation.";
        addressDiv.textContent = "-";
      }
    }

    function searchByLatLon() {
      const input = latlonInput.value.trim();
      const parts = input.split(",");
      if (parts.length !== 2) {
        showMessage("Format salah. Gunakan: lat, lon");
        return;
      }

      const lat = parseFloat(parts[0].trim());
      const lon = parseFloat(parts[1].trim());
      if (isNaN(lat) || isNaN(lon)) {
        showMessage("Koordinat tidak valid.");
        return;
      }

      updateLocation(lat, lon);
    }

    function openInMaps() {
      if (lastLat && lastLon) {
        window.open(`https://www.google.com/maps?q=${lastLat},${lastLon}`, "_blank");
      }
    }

    function shareToWhatsApp() {
      if (!lastLat || !lastLon) return;

      const url = `https://www.google.com/maps?q=${lastLat},${lastLon}`;
      const text = `📍 Lokasi:\nKoordinat: ${lastLat}, ${lastLon}\nMap: ${url}\nAlamat: ${addressDiv.textContent}`;
      const encoded = encodeURIComponent(text);
      window.open(`https://wa.me/?text=${encoded}`, "_blank");
    }

    coordsDiv.onclick = () => {
      navigator.clipboard.writeText(coordsDiv.textContent);
      showMessage("Koordinat disalin!");
    };

    addressDiv.onclick = () => {
      navigator.clipboard.writeText(addressDiv.textContent);
      showMessage("Alamat disalin!");
    };
    // ── DARK MODE ──
    const body = document.body;
    const toggleIcon = document.getElementById('toggleIcon');

    if (localStorage.getItem('theme') === 'dark') {
        body.classList.add('dark');
        if (toggleIcon) toggleIcon.className = 'fas fa-sun';
    }

    window.toggleDark = function() {
        body.classList.toggle('dark');
        const isDark = body.classList.contains('dark');
        if (toggleIcon) toggleIcon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }
  </script>

</body>
</html>
