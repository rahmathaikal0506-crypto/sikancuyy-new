<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Deal PSB - SikanCuyy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Sora:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="../style.css">
    <link rel="shortcut icon" href="../favicon.png" type="image/png">
</head>
<body>

<div class="container">
    <a href="../index.html" class="back-btn" title="Kembali">
        <i class="fas fa-arrow-left"></i>
    </a>

    <header>
        <div class="logo-badge"><span></span> Order</div>
        <h1>Form Deal <span class="accent">PSB</span></h1>
        <p class="subtitle">Input data pesanan dan kirim langsung ke Telegram</p>
        <div class="divider"></div>
    </header>

    <div class="card">
        <h3 class="section-title">Raw Data Input</h3>
        <div class="form-group">
            <textarea id="rawInput" rows="6" placeholder="Tempelkan data /dealpsb di sini untuk isi otomatis..."></textarea>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button type="button" class="btn btn-danger" style="flex: 1;" onclick="resetForm()">Clear</button>
            <button class="btn btn-primary" style="flex: 2;" onclick="kirimKeTelegram()">Kirim ke Telegram</button>
        </div>
        <div id="statusMessage" style="margin-top: 10px; text-align: center; font-weight: 600;"></div>
    </div>

    <div class="card">
        <h3 class="section-title">Detail Pesanan</h3>
        <form id="psbForm">
            <div class="form-group">
                <label>Unggah Foto (Opsional)</label>
                <input type="file" id="photoInput" accept="image/*">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>NO AO</label>
                    <input type="text" id="noao">
                </div>
                <div class="form-group">
                    <label>KKONTAK</label>
                    <input type="text" id="kkontak">
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>NAMA PELANGGAN</label>
                    <input type="text" id="nama">
                </div>
                <div class="form-group">
                    <label>STO</label>
                    <input type="text" id="sto">
                </div>
                <div class="form-group">
                    <label>TIKOR</label>
                    <input type="text" id="tikor">
                </div>
            </div>

            <div class="form-group">
                <label>LOK (Alamat Lengkap)</label>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="lok" readonly onclick="salinAlamat()" style="flex: 1; border-style: dashed; cursor: pointer;" placeholder="Alamat otomatis...">
                    <button type="button" class="btn btn-secondary" onclick="ambilLokasiSaatIni()" title="Ambil Lokasi"><i class="fas fa-location-arrow"></i></button>
                </div>
            </div>

            <div class="card" style="padding: 10px; margin: 20px 0;">
                <iframe id="map" src="" allowfullscreen loading="lazy" style="width: 100%; height: 250px; border-radius: var(--radius-sm); border: 1px solid var(--border);"></iframe>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>PSB</label>
                    <select id="psb">
                        <option>EZNET</option>
                        <option>INDIHOME</option>
                        <option>EZNET WIRRELES</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>PAKET</label>
                    <select id="paket">
                        <option>20 MBPS</option>
                        <option>50 MBPS</option>
                        <option>75 MBPS</option>
                        <option>150 MBPS</option>
                        <option>200 MBPS</option>
                        <option>10 MBPS</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>NO HP</label>
                    <input type="text" id="nohp">
                </div>
                <div class="form-group">
                    <label>CP ALTERNATIF</label>
                    <input type="text" id="cpalt">
                </div>
                <div class="form-group">
                    <label>TIANG / PT2</label>
                    <input type="text" id="tiang">
                </div>
                <div class="form-group">
                    <label>TL</label>
                    <input type="text" id="tl">
                </div>
            </div>
        </form>
    </div>

    <footer style="margin-top: 40px; text-align: center; font-size: 0.85rem; color: var(--text-secondary); opacity: 0.7;">
        &copy; 2025 Rahmat Haikal · SikanCuyy
    </footer>
</div>

<button class="dark-toggle" onclick="toggleDark()" title="Toggle Dark Mode">
    <i class="fas fa-moon" id="toggleIcon"></i>
</button>

<script>
    const body = document.body;
    const icon = document.getElementById('toggleIcon');

    if (localStorage.getItem('theme') === 'dark') {
        body.classList.add('dark');
        if (icon) icon.className = 'fas fa-sun';
    }

    function toggleDark() {
        body.classList.toggle('dark');
        const isDark = body.classList.contains('dark');
        if (icon) icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    const BOT_TOKEN = "8368927751:AAF6z3WQkRG1b4HzaXFZ8ph0sjSNVVHKlPs";
    const CHAT_ID = "@spahh43";
    const statusMessage = document.getElementById("statusMessage");
    const rawInput = document.getElementById("rawInput");
    const lokInput = document.getElementById("lok");
    const tikorInput = document.getElementById("tikor");
    const mapIframe = document.getElementById("map");

    tikorInput.addEventListener("input", () => {
        tikorInput.value = tikorInput.value.replace(/\s/g, '');
        updateMap(tikorInput.value);
    });

    async function ambilAlamatDariKoordinat(lat, lon) {
        if (!lat || !lon) return "";
        const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`;
        try {
            const response = await fetch(url, { headers: { 'Accept-Language': 'id', 'User-Agent': 'Form Deal PSB App' } });
            const data = await response.json();
            return data.display_name || `Dekat koordinat: ${lat}, ${lon}`;
        } catch (error) {
            console.error("Gagal mengambil alamat:", error);
            return `Dekat koordinat: ${lat}, ${lon}`;
        }
    }

    function salinAlamat() {
        const text = lokInput.value;
        if (text) {
            navigator.clipboard.writeText(text)
                .then(() => {
                    statusMessage.textContent = "✅ Alamat disalin!";
                    statusMessage.style.color = "#10b981";
                })
                .catch(() => alert("Gagal menyalin."));
        }
    }
    
    function resetForm() {
        document.getElementById("psbForm").reset();
        rawInput.value = "";
        lokInput.value = "";
        statusMessage.textContent = "";
        document.getElementById("photoInput").value = null;
        updateMap("");
    }
    
    function parseData(text) {
        const data = {};
        const lines = text.split("\n").map(l => l.trim());
        const labels = ["NO AO :", "KKONTAK :", "NAMA PELANGGAN :", "STO :", "TIKOR :", "PSB :", "PAKET :", "NO HP :", "CP ALTERNATIF :", "TIANG / PT2 :", "TL :", "LOK :"];
        labels.forEach(label => {
            const line = lines.find(l => l.startsWith(label));
            if (line) {
                const key = label.replace(/ :/, "").toLowerCase().replace(/ /g, "").replace(/\//g, "").replace(/-/g, "");
                data[key] = line.replace(label, "").trim();
            }
        });
        if (!data.namapelanggan) {
            const namaLine = lines.find(l => l.startsWith('NAMA PELANGGAN :'));
            if (namaLine) data.namapelanggan = namaLine.replace('NAMA PELANGGAN :', '').trim();
        }
        return data;
    }

    async function isiOtomatisDariInput() {
        const text = rawInput.value.trim();
        if (!text.includes("/dealpsb")) return;
        const fields = parseData(text);
        const namaInput = document.getElementById('nama');
        if (fields.namapelanggan && namaInput) namaInput.value = fields.namapelanggan;

        for (const key in fields) {
            const el = document.getElementById(key);
            if (el) {
                if (el.tagName === 'SELECT') {
                    const optionExists = Array.from(el.options).some(opt => opt.value === fields[key]);
                    if (optionExists) el.value = fields[key];
                } else el.value = fields[key];
            }
        }

        if (fields.tikor) {
            const tikorTanpaSpasi = fields.tikor.replace(/\s/g, '');
            tikorInput.value = tikorTanpaSpasi;
            if (!fields.lok) {
                lokInput.value = "Mengambil alamat...";
                const [lat, lon] = tikorTanpaSpasi.split(",").map(s => s.trim());
                const alamat = await ambilAlamatDariKoordinat(lat, lon);
                lokInput.value = alamat;
            }
            updateMap(tikorTanpaSpasi);
        }
    }

    rawInput.addEventListener("input", isiOtomatisDariInput);

    function updateMap(tikor) {
        if (tikor && tikor.includes(",")) {
            const [lat, lon] = tikor.split(",").map(s => s.trim());
            const mapsUrl = `https://maps.google.com/maps?q=${lat},${lon}&hl=id&z=17&t=k&output=embed`;
            mapIframe.src = mapsUrl;
        } else mapIframe.src = "";
    }
    
    function ambilLokasiSaatIni() {
        if ("geolocation" in navigator) {
            statusMessage.textContent = "Mengambil lokasi...";
            statusMessage.style.color = "var(--text-primary)";
            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                const tikor = `${lat},${lon}`;
                tikorInput.value = tikor;
                updateMap(tikor);
                lokInput.value = "Mengambil alamat...";
                const alamat = await ambilAlamatDariKoordinat(lat, lon);
                lokInput.value = alamat;
                statusMessage.textContent = "✅ Lokasi berhasil diambil!";
                statusMessage.style.color = "#10b981";
            }, (error) => {
                statusMessage.textContent = `❌ Gagal: ${error.message}`;
                statusMessage.style.color = "#ef4444";
            });
        }
    }

    async function kirimKeTelegram() {
        statusMessage.textContent = "⌛ Mengirim...";
        statusMessage.style.color = "var(--text-primary)";
        const tikor = tikorInput.value;
        let textMessage = `/dealpsb\nNO AO : ${document.getElementById('noao').value}\nKKONTAK : ${document.getElementById('kkontak').value}\nNAMA PELANGGAN : ${document.getElementById('nama').value}\nSTO : ${document.getElementById('sto').value}\nTIKOR : ${tikor}\nPSB : ${document.getElementById('psb').value}\nPAKET : ${document.getElementById('paket').value}\nNO HP : ${document.getElementById('nohp').value}\nCP ALTERNATIF : ${document.getElementById('cpalt').value}\nTIANG / PT2 : ${document.getElementById('tiang').value}\nTL : ${document.getElementById('tl').value}\nLOK : ${lokInput.value}`;
        
        if (tikor && tikor.includes(",")) {
            const [lat, lon] = tikor.split(",").map(s => s.trim());
            textMessage += `\n\nMaps: https://www.google.com/maps?q=${lat},${lon}`;
        }

        const photoInput = document.getElementById("photoInput");
        const file = photoInput.files[0];

        try {
            if (file) {
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('photo', file);
                formData.append('caption', textMessage);
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: "POST", body: formData });
                if (!res.ok) throw new Error("Gagal kirim foto");
            } else {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: textMessage })
                });
                if (!res.ok) throw new Error("Gagal kirim pesan");
            }
            statusMessage.textContent = "✅ Berhasil dikirim!";
            statusMessage.style.color = "#10b981";
            setTimeout(() => { resetForm(); window.scrollTo({top:0, behavior:'smooth'}); }, 1500);
        } catch (err) {
            statusMessage.textContent = `❌ Gagal: ${err.message}`;
            statusMessage.style.color = "#ef4444";
        }
    }
</script>
</body>
</html>
