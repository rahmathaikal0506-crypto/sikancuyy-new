<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Konversi Mbps - SikanCuyy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Sora:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="../style.css">
    <link rel="shortcut icon" href="../favicon/05_kalkulator.svg" type="image/svg+xml">
</head>
<body>

<div class="container">
    <a href="../index.html" class="back-btn" title="Kembali">
        <i class="fas fa-arrow-left"></i>
    </a>

    <header>
        <div class="logo-badge"><span></span> Network</div>
        <h1>Konversi <span class="accent">Mbps</span></h1>
        <p class="subtitle">Kalkulator konversi bit ke byte (1 Byte = 8 bit)</p>
        <div class="divider"></div>
    </header>

    <div class="card">
        <div class="form-group">
            <label for="mbps"><i class="fas fa-bolt"></i> Mbps (Megabit per detik)</label>
            <input type="number" id="mbps" placeholder="Masukkan angka Mbps..." oninput="convertFromMbps()" />
        </div>

        <div style="text-align: center; margin: 15px 0; font-size: 1.5rem; color: var(--accent);">
            <i class="fas fa-exchange-alt"></i>
        </div>

        <div class="form-group">
            <label for="mbs"><i class="fas fa-download"></i> MB/s (Megabyte per detik)</label>
            <input type="number" id="mbs" placeholder="Hasil MB/s..." oninput="convertFromMBs()" />
        </div>
        
        <p style="font-size: 0.8rem; color: var(--text-secondary); text-align: center; margin-top: 20px;">
            <i class="fas fa-info-circle"></i> Rumus: Mbps / 8 = MB/s
        </p>
    </div>

    <footer style="margin-top: 40px; text-align: center; font-size: 0.85rem; color: var(--text-secondary); opacity: 0.7;">
        &copy; 2025 Rahmat Haikal · SikanCuyy
    </footer>
</div>

<button class="dark-toggle" onclick="toggleDark()" title="Toggle Dark Mode">
    <i class="fas fa-moon" id="toggleIcon"></i>
</button>

<script>
    const body = document.body;
    const icon = document.getElementById('toggleIcon');

    if (localStorage.getItem('theme') === 'dark') {
        body.classList.add('dark');
        if (icon) icon.className = 'fas fa-sun';
    }

    function toggleDark() {
        body.classList.toggle('dark');
        const isDark = body.classList.contains('dark');
        if (icon) icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    function convertFromMbps() {
      const mbps = parseFloat(document.getElementById("mbps").value);
      if (!isNaN(mbps)) {
        document.getElementById("mbs").value = (mbps * 0.125).toFixed(2);
      } else {
        document.getElementById("mbs").value = "";
      }
    }

    function convertFromMBs() {
      const mbs = parseFloat(document.getElementById("mbs").value);
      if (!isNaN(mbs)) {
        document.getElementById("mbps").value = (mbs * 8).toFixed(2);
      } else {
        document.getElementById("mbps").value = "";
      }
    }
</script>
</body>
</html>
