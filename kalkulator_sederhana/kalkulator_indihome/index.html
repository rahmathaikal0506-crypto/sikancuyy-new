<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalkulator Indihome - SikanCuyy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Sora:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="../../style.css">
    <link rel="shortcut icon" href="../../favicon/05_kalkulator.svg" type="image/svg+xml">
</head>
<body>

<div class="container">
    <a href="../index.html" class="back-btn" title="Kembali">
        <i class="fas fa-arrow-left"></i>
    </a>

    <header>
        <div class="logo-badge"><span></span> Indihome</div>
        <h1>Cek <span class="accent">Billing</span></h1>
        <p class="subtitle">Simulasi total tagihan termasuk PPN dan biaya admin</p>
        <div class="divider"></div>
    </header>

    <div class="card">
        <div class="form-group">
            <label for="uang"><i class="fas fa-money-bill-wave"></i> Harga Paket (IDR)</label>
            <input type="text" id="uang" placeholder="Masukkan harga pokok paket..." oninput="formatAndCalculate()" />
        </div>

        <div class="form-group">
            <label for="biayaLainnya"><i class="fas fa-file-invoice-dollar"></i> Biaya Admin (IDR)</label>
            <input type="text" id="biayaLainnya" value="5.550" placeholder="Masukkan biaya lainnya..." oninput="formatAndCalculate()" />
        </div>
        
        <div class="form-group">
            <label for="ppn"><i class="fas fa-percent"></i> PPN (%)</label>
            <input type="number" id="ppn" value="11" min="0" oninput="calculate()" />
        </div>

        <div class="card" style="background: var(--surface-2); margin-top: 20px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span style="color: var(--text-secondary);">Harga Pokok:</span>
                <span id="harga-pokok" style="font-weight: 600;">Rp 0</span>
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span style="color: var(--text-secondary);">Biaya Admin:</span>
                <span id="biaya-lainnya-result" style="font-weight: 600;">Rp 0</span>
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span style="color: var(--text-secondary);">Nilai PPN:</span>
                <span id="result-ppn" style="font-weight: 600; color: #ef4444;">+ Rp 0</span>
            </div>
            <div class="divider"></div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
                <span style="font-weight: 700; font-size: 1.1rem;">Total Tagihan:</span>
                <span id="result-total" style="font-weight: 800; font-size: 1.25rem; color: var(--accent);">Rp 0</span>
            </div>
        </div>
    </div>

    <footer style="margin-top: 40px; text-align: center; font-size: 0.85rem; color: var(--text-secondary); opacity: 0.7;">
        &copy; 2025 Rahmat Haikal · SikanCuyy
    </footer>
</div>

<button class="dark-toggle" onclick="toggleDark()" title="Toggle Dark Mode">
    <i class="fas fa-moon" id="toggleIcon"></i>
</button>

<script>
    const body = document.body;
    const icon = document.getElementById('toggleIcon');

    if (localStorage.getItem('theme') === 'dark') {
        body.classList.add('dark');
        if (icon) icon.className = 'fas fa-sun';
    }

    function toggleDark() {
        body.classList.toggle('dark');
        const isDark = body.classList.contains('dark');
        if (icon) icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    function formatRupiah(number) {
        return new Intl.NumberFormat('id-ID', {
            style: 'currency',
            currency: 'IDR',
            minimumFractionDigits: 0
        }).format(number);
    }

    function calculate() {
        const uangInput = document.getElementById('uang');
        const ppnInput = document.getElementById('ppn');
        const biayaLainnyaInput = document.getElementById('biayaLainnya');
        
        const hargaPokokDiv = document.getElementById('harga-pokok');
        const biayaLainnyaResultDiv = document.getElementById('biaya-lainnya-result');
        const resultPpnDiv = document.getElementById('result-ppn');
        const resultTotalDiv = document.getElementById('result-total');

        const uangValue = uangInput.value.replace(/\D/g, ''); 
        const biayaLainnyaValue = biayaLainnyaInput.value.replace(/\D/g, ''); 
        const ppnValue = parseFloat(ppnInput.value) || 0;

        let hargaPokok = 0;
        let biayaLainnya = 0;
        let ppn = 0;
        let total = 0;

        if (uangValue) {
            hargaPokok = parseInt(uangValue);
            if (biayaLainnyaValue) biayaLainnya = parseInt(biayaLainnyaValue);
            ppn = (hargaPokok * ppnValue) / 100;
            total = hargaPokok + ppn + biayaLainnya;
        }

        hargaPokokDiv.textContent = formatRupiah(hargaPokok);
        biayaLainnyaResultDiv.textContent = formatRupiah(biayaLainnya);
        resultPpnDiv.textContent = `+ ${formatRupiah(ppn)}`;
        resultTotalDiv.textContent = formatRupiah(total);
    }

    function formatAndCalculate() {
        const uangInput = document.getElementById('uang');
        const biayaLainnyaInput = document.getElementById('biayaLainnya');
        
        let uangValue = uangInput.value.replace(/\D/g, ''); 
        if (uangValue) {
            uangInput.value = parseInt(uangValue).toLocaleString('id-ID');
        }
        
        let biayaLainnyaValue = biayaLainnyaInput.value.replace(/\D/g, ''); 
        if (biayaLainnyaValue) {
            biayaLainnyaInput.value = parseInt(biayaLainnyaValue).toLocaleString('id-ID');
        }

        calculate();
    }
    
    document.addEventListener('DOMContentLoaded', formatAndCalculate);
</script>
</body>
</html>
