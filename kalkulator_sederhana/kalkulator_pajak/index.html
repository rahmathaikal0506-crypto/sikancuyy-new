<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalkulator PPN - SikanCuyy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Sora:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="../../style.css">
    <link rel="shortcut icon" href="../../favicon/05_kalkulator.svg" type="image/svg+xml">
</head>
<body>

<div class="container">
    <a href="../index.html" class="back-btn" title="Kembali">
        <i class="fas fa-arrow-left"></i>
    </a>

    <header>
        <div class="logo-badge"><span></span> Finance</div>
        <h1>Kalkulator <span class="accent">PPN</span></h1>
        <p class="subtitle">Hitung Pajak Pertambahan Nilai dengan cepat</p>
        <div class="divider"></div>
    </header>

    <div class="card">
        <div class="form-group">
            <label for="harga"><i class="fas fa-money-bill-wave"></i> Harga Sebelum PPN</label>
            <input type="number" id="harga" placeholder="Masukkan harga pokok..." oninput="hitung()" />
        </div>

        <div class="form-group">
            <label for="ppn"><i class="fas fa-percent"></i> Tarif PPN (%)</label>
            <input type="number" id="ppn" value="11" oninput="hitung()" />
        </div>

        <div class="card" style="background: var(--surface-2); margin-top: 20px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span style="color: var(--text-secondary);">Harga Pokok:</span>
                <span id="pokok" style="font-weight: 600;">Rp 0</span>
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span style="color: var(--text-secondary);">Nilai PPN:</span>
                <span id="ppn-hasil" style="font-weight: 600; color: #ef4444;">+ Rp 0</span>
            </div>
            <div class="divider"></div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
                <span style="font-weight: 700; font-size: 1.1rem;">Total Bayar:</span>
                <span id="total" style="font-weight: 800; font-size: 1.25rem; color: var(--accent);">Rp 0</span>
            </div>
        </div>
    </div>

    <footer style="margin-top: 40px; text-align: center; font-size: 0.85rem; color: var(--text-secondary); opacity: 0.7;">
        &copy; 2025 Rahmat Haikal · SikanCuyy
    </footer>
</div>

<button class="dark-toggle" onclick="toggleDark()" title="Toggle Dark Mode">
    <i class="fas fa-moon" id="toggleIcon"></i>
</button>

<script>
    const body = document.body;
    const icon = document.getElementById('toggleIcon');

    if (localStorage.getItem('theme') === 'dark') {
        body.classList.add('dark');
        if (icon) icon.className = 'fas fa-sun';
    }

    function toggleDark() {
        body.classList.toggle('dark');
        const isDark = body.classList.contains('dark');
        if (icon) icon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    function formatRupiah(angka) {
      return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
    }

    function hitung() {
      let harga = parseInt(document.getElementById('harga').value) || 0;
      let tarif = parseFloat(document.getElementById('ppn').value) || 0;

      let ppn = harga * tarif / 100;
      let total = harga + ppn;

      document.getElementById('pokok').textContent = formatRupiah(harga);
      document.getElementById('ppn-hasil').textContent = formatRupiah(ppn);
      document.getElementById('total').textContent = formatRupiah(total);
    }
</script>
</body>
</html>
