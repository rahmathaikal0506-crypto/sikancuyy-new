<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pengeluaran Harian - SikanCuyy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Sora:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="../style.css">
    <link rel="shortcut icon" href="../favicon/03_pengeluaran.svg" type="image/svg+xml">
</head>
<body>

<div class="container">

    <header>
        <div class="logo-badge"><span></span> Keuangan</div>
        <h1>Pengeluaran <span class="accent">Harian</span></h1>
        <p class="subtitle">Catat pengeluaranmu dengan mudah</p>
        <div class="divider"></div>
    </header>

    <div class="card">
        <h3 class="section-title">Tambah Pengeluaran</h3>
        <form id="expense-form" style="display: flex; flex-direction: column; gap: 10px;">
            <input type="text" id="description" placeholder="Deskripsi (misal: Makan)" required />
            <input type="number" id="amount" placeholder="Jumlah (dlm ribuan, misal: 20)" required />
            <button type="submit" class="btn btn-primary">Tambah</button>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px;">
                <button type="button" class="btn btn-secondary" onclick="exportCSV()">Ekspor CSV</button>
                <button type="button" class="btn btn-secondary" onclick="backupToGoogleSheet()">Backup Cloud</button>
            </div>
            <button type="button" class="btn btn-danger" onclick="deleteAllExpenses()">Hapus Semua Data</button>
        </form>
    </div>

    <div class="card">
        <h3 class="section-title">Daftar Pengeluaran</h3>
        <div class="table-container">
            <table id="expense-table">
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Deskripsi</th>
                        <th>Jumlah</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <button id="show-more-btn" class="btn btn-secondary" style="display: none; width: 100%; margin-top: 15px;">Tampilkan Semua</button>
        <div class="total" id="total-expense" style="margin-top: 20px; font-weight: 800; font-size: 1.2rem; text-align: right; color: var(--accent);">
            Total: Rp 0
        </div>
    </div>

</div> <!-- Close container -->

<a href="../index.html" class="back-btn" title="Kembali ke Beranda">
    <i class="fas fa-arrow-left"></i>
</a>

<div class="overlay" id="overlay">
  <div class="overlay-content">
    <div class="spinner"></div>
    <div class="loading-text">Memproses</div>
  </div>
</div>

<div class="feedback" id="feedback-msg"></div>

<button class="dark-toggle" onclick="toggleDark()" title="Toggle Dark Mode">
    <i class="fas fa-moon" id="toggleIcon"></i>
</button>

<style>
/* Local overrides for pengeluaran app if needed */
.overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255, 255, 255, 0.85);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}
body.dark .overlay { background: rgba(13, 15, 26, 0.85); }
.spinner {
  border: 6px solid var(--border);
  border-top: 6px solid var(--accent);
  border-radius: 50%;
  width: 50px;
  height: 50px;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.feedback {
  position: fixed;
  bottom: 1rem;
  left: 50%;
  transform: translateX(-50%);
  background: #10b981;
  color: white;
  padding: 0.75rem 1.5rem;
  border-radius: 0.5rem;
  font-weight: 600;
  opacity: 0;
  pointer-events: none;
  transition: all 0.3s ease;
  z-index: 10000;
}
.feedback.error { background: #ef4444; }
.feedback.show { opacity: 1; transform: translateX(-50%) translateY(-10px); pointer-events: auto; }
</style>





<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const form = document.getElementById('expense-form');
    const tableBody = document.querySelector('#expense-table tbody');
    const totalExpenseDiv = document.getElementById('total-expense');
    const overlay = document.getElementById('overlay');
    const feedback = document.getElementById('feedback-msg');
    const showMoreBtn = document.getElementById('show-more-btn');

    let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
    let isShowingAll = false;

    const TELEGRAM_TOKEN = '7862572046:AAFWzO4I2ykCAw6k9MfAnJZUTkBbTnim3SM';
    const TELEGRAM_CHAT_ID = '1815450054';

    const showOverlay = () => overlay.style.display = 'flex';
    const hideOverlay = () => overlay.style.display = 'none';

    const showFeedback = (msg, isError = false) => {
      feedback.textContent = msg;
      feedback.className = 'feedback show' + (isError ? ' error' : '');
      setTimeout(() => feedback.classList.remove('show'), 3000);
    };

    const saveExpenses = () => localStorage.setItem('expenses', JSON.stringify(expenses));

    const renderTable = () => {
      tableBody.innerHTML = '';
      const visible = isShowingAll ? expenses : expenses.slice(0, 5);

      visible.forEach((item, i) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${item.date}</td>
          <td>${item.description}</td>
          <td>Rp ${item.amount.toLocaleString('id-ID')}</td>
          <td class="actions"><button class="btn btn-danger delete-btn" style="padding: 6px 12px; font-size: 0.8rem;" data-index="${expenses.indexOf(item)}">Hapus</button></td>
        `;
        tableBody.appendChild(row);
      });

      showMoreBtn.style.display = expenses.length > 5 ? 'block' : 'none';
      showMoreBtn.textContent = isShowingAll ? 'Sembunyikan Sebagian' : 'Tampilkan Semua';
    };

    const updateTotalExpense = () => {
      const total = expenses.reduce((sum, item) => sum + item.amount, 0);
      totalExpenseDiv.textContent = `Total Pengeluaran: Rp ${total.toLocaleString('id-ID')}`;
    };





const sendTelegramPDF = async (data) => {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const bulanHari = {
    0: 'Minggu',
    1: 'Senin',
    2: 'Selasa',
    3: 'Rabu',
    4: 'Kamis',
    5: 'Jumat',
    6: 'Sabtu'
  };

  const now = new Date();
  const dayName = bulanHari[now.getDay()];
  const formattedDate = now.toLocaleDateString('id-ID', {
    day: 'numeric', month: 'long', year: 'numeric'
  });
  const exportLabel = `${dayName}, ${formattedDate}`;

  doc.setFillColor(33, 150, 243); // Profesional biru
  doc.rect(0, 0, 210, 30, 'F');

  try {
    const logoBase64 = ""; // Optional logo
    if (logoBase64) doc.addImage(logoBase64, 'PNG', 10, 5, 20, 20);
  } catch (e) {
    console.warn("Logo tidak dimuat:", e.message);
  }

  doc.setFontSize(16);
  doc.setTextColor(255, 255, 255);
  doc.setFont("helvetica", "bold");
  doc.text("Pengeluaran Harian", 105, 15, { align: 'center' });

  doc.setFontSize(10);
  doc.text(`Tanggal: ${exportLabel}`, 105, 22, { align: 'center' });

  doc.setDrawColor(255);
  doc.line(10, 30, 200, 30);

  let startY = 40;
  const lineHeight = 10;
  let total = 0;

  doc.setTextColor(0, 0, 0);
  doc.setFontSize(11);
  doc.setFont("helvetica", "bold");

  doc.text("No", 10, startY);
  doc.text("Tanggal", 20, startY);
  doc.text("Deskripsi", 70, startY);
  doc.text("Jumlah (Rp)", 200, startY, { align: 'right' });

  doc.setTextColor(0, 0, 0);
  doc.setFontSize(11);
  doc.setFont("helvetica", "normal");


  startY += 5;
  doc.line(10, startY, 200, startY);
  startY += 5;

  data.forEach((item, index) => {
    if (startY > 280) {
      doc.addPage();
      startY = 20;
    }

    doc.text(String(index + 1), 10, startY);
    doc.text(item.date, 20, startY);
    doc.text(item.description, 70, startY);
    doc.text(`Rp ${item.amount.toLocaleString('id-ID')}`, 200, startY, { align: 'right' });

    total += item.amount;
    startY += lineHeight;
  });

  startY += 5;
  doc.setFont("helvetica", "bold");
  doc.setFontSize(12);
  doc.text(`Total Pengeluaran: Rp ${total.toLocaleString('id-ID')}`, 200, startY, { align: 'right' });


  const pdfBlob = doc.output('blob');
  const formData = new FormData();
  formData.append('chat_id', TELEGRAM_CHAT_ID);
  formData.append('document', pdfBlob, `${exportLabel}.pdf`);

  return fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendDocument`, {
    method: 'POST',
    body: formData
  }).then(res => res.json()).then(result => {
    if (!result.ok) throw new Error(result.description);
  });
};




   
    const handleDelete = (index) => {
      expenses.splice(index, 1);
      saveExpenses();
      renderTable();
      updateTotalExpense();
    };

    const deleteAllExpenses = () => {
      if (!expenses.length) return showFeedback('Belum ada pengeluaran untuk dihapus.', true);
      if (confirm('Apakah Anda yakin ingin menghapus semua pengeluaran?')) {
        expenses = [];
        saveExpenses();
        renderTable();
        updateTotalExpense();
        showFeedback('Semua pengeluaran dihapus.');
      }
    };

    const exportCSV = () => {
      if (!expenses.length) return showFeedback('Belum ada pengeluaran untuk diekspor.', true);

      let csv = 'Tanggal,Deskripsi,Jumlah (Rp)\n';
      expenses.forEach(item => {
        csv += `${item.date},${item.description},${item.amount}\n`;
      });

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `backup_${new Date().toISOString().slice(0, 10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    };

    const backupToGoogleSheet = () => {
      if (!expenses.length) return showFeedback('Belum ada data untuk dibackup.', true);

      showOverlay();
      fetch('https://script.google.com/macros/s/AKfycbxLrmczoCfcsiFi9GBhFOBAxoo7KhMCcJ05jA7JE307qgEGWPry7Ezu2f2r5RVVeYTT6w/exec', {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(expenses)
      })
      .then(() => sendTelegramPDF(expenses))
      .then(() => {
        hideOverlay();
        showFeedback('Backup berhasil dan PDF Telegram dikirim!');
      })
      .catch(err => {
        hideOverlay();
        console.error(err);
        showFeedback('Gagal backup atau kirim Telegram.', true);
      });
    };

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      showOverlay();

      const now = new Date();
      const formattedDateTime = now.toLocaleString('id-ID', {
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      });

      let description = document.getElementById('description').value.trim();
      description = description.charAt(0).toUpperCase() + description.slice(1);
      let amountInput = parseFloat(document.getElementById('amount').value);

      if (isNaN(amountInput) || amountInput < 0) {
        hideOverlay();
        return showFeedback('Masukkan jumlah pengeluaran yang valid.', true);
      }

      const entry = {
        date: formattedDateTime,
        description,
        amount: amountInput * 1000
      };

      expenses.push(entry);
      saveExpenses();
      renderTable();
      updateTotalExpense();
      form.reset();
      form.elements.description.focus();
      hideOverlay();
      showFeedback('Pengeluaran berhasil ditambahkan!');
    });

    document.body.addEventListener('pointerup', (e) => {
      const target = e.target;
      if (target.classList.contains('delete-btn')) {
        const index = parseInt(target.dataset.index, 10);
        handleDelete(index);
      }
      if (target.id === 'show-more-btn') {
        isShowingAll = !isShowingAll;
        renderTable();
      }
    });

    renderTable();
    updateTotalExpense();

    window.deleteAllExpenses = deleteAllExpenses;
    window.exportCSV = exportCSV;
    window.backupToGoogleSheet = backupToGoogleSheet;

    // ── DARK MODE ──
    const body = document.body;
    const toggleIcon = document.getElementById('toggleIcon');

    if (localStorage.getItem('theme') === 'dark') {
        body.classList.add('dark');
        if (toggleIcon) toggleIcon.className = 'fas fa-sun';
    }

    window.toggleDark = function() {
        body.classList.toggle('dark');
        const isDark = body.classList.contains('dark');
        if (toggleIcon) toggleIcon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }
  });
</script>





</body>
</html>
